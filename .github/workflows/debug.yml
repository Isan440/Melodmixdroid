name: KHMelonMix Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleGitHubProdDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KHMelonMix-Debug
          path: app/build/outputs/apk/gitHubProd/debug/*.apk
  

